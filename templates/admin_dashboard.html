{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Admin Control Panel</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h5>Total Students</h5>
                <p>View registered student accounts</p>
                <a href="/students" class="btn btn-primary btn-sm">View Students</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h5>Companies</h5>
                <p>Manage registered companies</p>
                <a href="/companies" class="btn btn-primary btn-sm">View Companies</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h5>Placement Drives</h5>
                <p>Monitor recruitment drives</p>
                <a href="/drives" class="btn btn-primary btn-sm">View Drives</a>
            </div>
        </div>

    </div>

    <hr>

    <div class="mt-3">
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

</div>

{% endblock %}
